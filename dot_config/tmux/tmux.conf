# ── General ───────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 10000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on

# ── Splits ────────────────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Pane navigation (vim-tmux-navigator) ─────────────────────────────────────
# Ctrl+h/j/k/l navigue entre panes tmux ET neovim sans distinction
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R

# ── Copy mode vi ─────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ── Sessionizer (Ctrl+f) ─────────────────────────────────────────────────────
bind -n C-f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# ── Cheatsheet (Prefix+?) ────────────────────────────────────────────────────
bind ? display-popup -E -w 80% -h 80% "glow ~/.config/cheatsheet.md | less -R"

# ── Workmux sidebar (Prefix+S) ───────────────────────────────────────────────
bind S run-shell "workmux sidebar"

# ── Status bar (Catppuccin Mocha colors) ─────────────────────────────────────
set -g status-position bottom
set -g status-style "bg=#1e1e2e fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 40
set -g status-left "#[fg=#89b4fa,bold] #S  "
set -g status-right "#[fg=#a6e3a1] %H:%M #[fg=#89b4fa] %d/%m/%Y "
set -g window-status-current-style "fg=#1e1e2e bg=#89b4fa bold"
set -g window-status-current-format "  #I:#W  "
set -g window-status-format "  #I:#W  "
set -g window-status-style "fg=#6c7086"
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
